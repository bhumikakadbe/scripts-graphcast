name: graphcast
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - cudatoolkit=11.8
  - cudnn=8.6.0
  - numpy=1.23.5
  - pandas=1.5.3
  - scipy=1.10.1
  - matplotlib=3.7.1
  - cartopy=0.21.1
  - shapely=2.0.1
  - rtree=1.0.1
  - netcdf4=1.6.2
  - zarr=2.14.2
  - dask=2023.3.2
  - toolz=0.12.0
  - fsspec=2023.3.0
  - gcsfs=2023.3.0
  - google-cloud-storage=2.8.0
  - pip:
    - --extra-index-url https://storage.googleapis.com/jax-releases/jax_releases.html
    - jax[cuda11_pip]==0.4.8
    - dm-haiku==0.0.9
    - dm-tree==0.1.8
    - jraph==0.0.6.dev0
    - chex==0.1.7
    - optax==0.1.4
    - trimesh==3.21.5
    - xarray-tensorstore==0.1.2
    - pygrib==2.1.5
    - tensorflow==2.11.0
    - fastapi==0.95.1
    - uvicorn==0.22.0
    - flask==2.3.2
    - requests==2.28.2
